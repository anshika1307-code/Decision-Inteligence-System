services:
  - type: web
    name: decision-intelligence-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install poetry && poetry install --no-dev"
    startCommand: "poetry run uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_HTTPS
        value: true
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_PORT
        value: 6379
