global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'decision-intelligence-monitor'

scrape_configs:
  # API Service
  - job_name: 'api'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/api/v1/metrics'

  # Qdrant
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: '/metrics'

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
